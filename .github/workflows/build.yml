name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  # The SDK is fetched directly from Garmin's public CDN. To bump it:
  # find the new build identifier (e.g. via the SDK Manager) and update both.
  SDK_VERSION: '9.1.0'
  SDK_BUILD: '2026-03-09-6a872a80b'

jobs:
  build:
    name: Build .iq
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # monkeyc is a Java tool; the Linux SDK doesn't bundle a JRE.
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Connect IQ SDK
        id: sdk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/connectiq-sdk
          key: connectiq-sdk-${{ env.SDK_VERSION }}-${{ env.SDK_BUILD }}-linux

      - name: Download Connect IQ SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/connectiq-sdk
          curl -fsSL \
            "https://developer.garmin.com/downloads/connect-iq/sdks/connectiq-sdk-lin-${SDK_VERSION}-${SDK_BUILD}.zip" \
            -o /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d ~/connectiq-sdk
          rm /tmp/sdk.zip

      - name: Add SDK to PATH
        run: |
          SDK_BIN=$(find ~/connectiq-sdk -maxdepth 4 -type d -name bin | head -1)
          if [ -z "$SDK_BIN" ]; then
            echo "::error::Could not find SDK bin/ under ~/connectiq-sdk"
            find ~/connectiq-sdk -maxdepth 3 -type d
            exit 1
          fi
          echo "Found SDK bin at: $SDK_BIN"
          chmod +x "$SDK_BIN"/monkeyc "$SDK_BIN"/monkeydo 2>/dev/null || true
          echo "$SDK_BIN" >> "$GITHUB_PATH"

      - name: Restore developer key
        env:
          DEV_KEY_B64: ${{ secrets.GARMIN_DEV_KEY_BASE64 }}
        run: |
          if [ -z "$DEV_KEY_B64" ]; then
            echo "::error::Missing secret GARMIN_DEV_KEY_BASE64"
            exit 1
          fi
          printf '%s' "$DEV_KEY_B64" | base64 -d > developer_key
          chmod 600 developer_key

      - name: Build store .iq
        run: monkeyc -e -o sauna.iq -f sauna/monkey.jungle -y developer_key -w

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sauna-iq
          path: sauna.iq
          if-no-files-found: error

      # On a `v*` tag push, create a DRAFT release with the .iq attached.
      # Drafts are mutable, so the file gets attached even when the repo
      # has immutable releases turned on; you then publish it manually.
      - name: Create draft release with .iq attached
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          draft: true
          files: sauna.iq
          generate_release_notes: true
