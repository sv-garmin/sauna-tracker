name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  # CI pulls the SDK + Devices + Fonts as one tarball from a release on
  # the private sv-garmin/toolbox repo. The Devices/Fonts data is
  # auth-gated on Garmin's side, so mirroring it ourselves keeps Garmin
  # credentials out of CI.
  SDK_VERSION: '9.1.0'
  SDK_BUILD: '2026-03-09-6a872a80b'
  TOOLBOX_REPO: 'sv-garmin/toolbox'
  TOOLBOX_TAG: 'sdk-9.1.0'
  BUNDLE_NAME: 'connectiq-9.1.0-2026-03-09-6a872a80b-linux.tar.gz'

jobs:
  build:
    name: Build .iq
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # monkeyc is a Java tool; the Linux SDK doesn't bundle a JRE.
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Connect IQ bundle
        id: sdk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.Garmin
          key: connectiq-bundle-${{ env.SDK_VERSION }}-${{ env.SDK_BUILD }}-linux

      - name: Download Connect IQ bundle from toolbox
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.TOOLBOX_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Missing secret TOOLBOX_TOKEN (fine-grained PAT with Contents:Read on ${TOOLBOX_REPO})"
            exit 1
          fi
          mkdir -p "$HOME/.Garmin"
          gh release download "$TOOLBOX_TAG" \
            --repo "$TOOLBOX_REPO" \
            --pattern "$BUNDLE_NAME" \
            --output /tmp/bundle.tar.gz
          tar -xzf /tmp/bundle.tar.gz -C "$HOME/.Garmin"
          rm /tmp/bundle.tar.gz

      - name: Add SDK to PATH
        run: |
          SDK_BIN="$HOME/.Garmin/ConnectIQ/Sdks/connectiq-sdk-lin-${SDK_VERSION}-${SDK_BUILD}/bin"
          if [ ! -d "$SDK_BIN" ]; then
            echo "::error::SDK bin not found at $SDK_BIN"
            find "$HOME/.Garmin" -maxdepth 4 -type d -name bin
            exit 1
          fi
          chmod +x "$SDK_BIN"/monkeyc "$SDK_BIN"/monkeydo 2>/dev/null || true
          echo "$SDK_BIN" >> "$GITHUB_PATH"

      - name: Restore developer key
        env:
          DEV_KEY_B64: ${{ secrets.GARMIN_DEV_KEY_BASE64 }}
        run: |
          if [ -z "$DEV_KEY_B64" ]; then
            echo "::error::Missing secret GARMIN_DEV_KEY_BASE64"
            exit 1
          fi
          printf '%s' "$DEV_KEY_B64" | base64 -d > developer_key
          chmod 600 developer_key

      - name: Build store .iq
        run: monkeyc -e -o sauna.iq -f sauna/monkey.jungle -y developer_key -w

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sauna-iq
          path: sauna.iq
          if-no-files-found: error

      # On a `v*` tag push, create a DRAFT release with the .iq attached.
      # Drafts are mutable, so the file gets attached even when the repo
      # has immutable releases turned on; you then publish it manually.
      - name: Create draft release with .iq attached
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          draft: true
          files: sauna.iq
          generate_release_notes: true
